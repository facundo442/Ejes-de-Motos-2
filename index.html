<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Destino Motos - Canvas Tactil Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF6A00;
    --bg: #09090b;
    --panel: #121214;
    --border: #222226;
    --text: #f4f4f5;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  header {
    background: var(--panel); border-bottom: 2px solid var(--orange);
    padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 10;
  }
  header h1 { font-size: 1rem; font-weight: 900; color: var(--orange); }

  .workspace { display: flex; flex: 1; height: calc(100vh - 45px); position: relative; }

  /* CONTENEDOR CENTRAL DEL CANVAS */
  .canvas-area {
    flex: 1; background: #0b0b0d; display: flex; align-items: center; justify-content: center;
    padding: 10px; position: relative; overflow: hidden;
  }
  .canvas-wrapper { position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
  canvas { display: block; background: #18181b; max-width: 100%; max-height: calc(100vh - 160px); object-fit: contain; }

  /* PANEL DE ACCIONES FLOTANTE / INFERIOR */
  .toolbar {
    position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%);
    background: rgba(18, 18, 20, 0.95); border: 1px solid var(--border);
    backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 30px;
    display: flex; gap: 8px; z-index: 20; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  
  /* MENÚ LATERAL CONFIGURACIÓN */
  .side-menu {
    width: 280px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; z-index: 10;
  }
  .menu-section { padding: 12px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 0.7rem; font-weight: 800; color: var(--orange); text-transform: uppercase; margin-bottom: 8px; }

  /* ELEMENTOS DE INTERFAZ */
  label { font-size: 0.7rem; color: #a1a1aa; display: block; margin-top: 6px; }
  input[type="text"], select, input[type="color"] {
    width: 100%; background: #18181b; border: 1px solid var(--border);
    border-radius: 6px; color: #fff; padding: 6px; font-size: 0.8rem; outline: none; margin-top: 2px;
  }
  input[type="range"] { width: 100%; accent-color: var(--orange); margin-top: 4px; }

  .btn {
    padding: 6px 12px; border: none; border-radius: 20px; font-weight: 700;
    font-size: 0.7rem; cursor: pointer; text-transform: uppercase;
    display: flex; align-items: center; gap: 4px; background: #27272a; color: #fff;
  }
  .btn-orange { background: var(--orange); color: #fff; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; }

  /* TIMELINE */
  .timeline {
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 6px; gap: 10px; z-index: 10;
  }
  .thumb-track { display: flex; gap: 6px; overflow-x: auto; flex: 1; }
  .frame-box { width: 45px; height: 60px; background: #000; border: 1px solid var(--border); border-radius: 4px; background-size: cover; }

  @media (max-width: 768px) {
    .workspace { flex-direction: column; }
    .side-menu { width: 100%; height: 160px; border-left: none; border-top: 1px solid var(--border); }
    .toolbar { bottom: 250px; scale: 0.9; width: 95%; justify-content: center; }
    .timeline { height: 75px; }
  }
</style>
</script>
</head>
<body>

<header>
  <h1>Destino Motos Táctil Studio</h1>
  <div style="display:flex; gap:6px;">
    <button class="btn btn-orange" onclick="captureFrame()">📸 Guardar Frame</button>
    <button class="btn" style="background:#047857;" onclick="downloadPNG()">🖼️ Descargar Flyer</button>
  </div>
</header>

<div class="workspace">
  <div class="canvas-area">
    <div class="toolbar">
      <button class="btn" onclick="addLayer('box')">⬜ +Caja</button>
      <button class="btn" onclick="addLayer('text')">✍️ +Texto</button>
      <button class="btn" onclick="document.getElementById('imageLoader').click()">📷 +Imagen</button>
      <input type="file" id="imageLoader" style="display:none;" accept="image/*" onchange="uploadImage(this)" />
    </div>
    
    <div class="canvas-wrapper">
      <canvas id="studioCanvas" width="1080" height="1440"></canvas>
    </div>
  </div>

  <div class="side-menu">
    <div class="menu-section" id="noSelectionNotice">
      <p style="font-size:0.75rem; color:#a1a1aa; text-align:center; padding:20px;">Toca cualquier elemento en el lienzo para editarlo con tus dedos o cambiar su estilo acá.</p>
    </div>
    <div class="menu-section" id="controlsPanel" style="display:none;">
      <div class="section-title" id="layerTitle">Propiedades de Capa</div>
      <div id="dynamicInputs"></div>
      <div style="display:flex; gap:6px; margin-top:10px;">
        <button class="btn" style="flex:1;" onclick="moveDepth('up')">🔺 Traer Al Frente</button>
        <button class="btn" style="flex:1;" onclick="moveDepth('down')">🔻 Enviar Atrás</button>
      </div>
      <button class="btn btn-danger" style="width:100%; margin-top:8px; justify-content:center;" onclick="deleteSelected()">🗑️ Eliminar Elemento</button>
    </div>
  </div>

  <div class="timeline">
    <button class="btn" style="padding:4px 8px;" onclick="compileGIF()">⬇️ Generar GIF</button>
    <div class="thumb-track" id="timelineTrack"></div>
  </div>
</div>

<script>
  // MODELO DE DATOS DE CAPAS INTERACTIVAS
  let layers = [];
  let selectedId = null;
  let timeline = [];
  
  // Variables de control táctil de arrastre
  let isDragging = false;
  let isResizing = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;
  let activeHandle = null;

  const canvas = document.getElementById('studioCanvas');
  const ctx = canvas.getContext('2d');

  // AGREGAR CAPAS MODULARES
  function addLayer(type) {
    const id = 'l_' + Date.now();
    let layer = {
      id: id, type: type,
      x: 200, y: 300, w: 400, h: 200,
      color: type === 'box' ? '#121214' : '#FFFFFF',
      borderColor: '#FF6A00', borderWidth: 3,
      text: 'NUEVO TEXTO', fontSize: 60, fontStyle: 'impact',
      chroma: 0, opacity: 1
    };
    layers.push(layer);
    selectedId = id;
    updateUI();
    render();
  }

  function uploadImage(input) {
    if (input.files && input.files[0]) {
      const r = new FileReader();
      r.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const id = 'l_' + Date.now();
          // Forzar que si es un fondo cubra el lienzo completo por defecto
          const isBackground = layers.length === 0;
          layers.push({
            id: id, type: 'image', img: img,
            x: isBackground ? 0 : 300, y: isBackground ? 0 : 400,
            w: isBackground ? canvas.width : img.width > 500 ? 500 : img.width,
            h: isBackground ? canvas.height : img.height > 500 ? 500 : img.height,
            chroma: 0, opacity: 1
          });
          selectedId = id;
          updateUI();
          render();
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(input.files[0]);
    }
  }

  // MOTOR GRÁFICO TÁCTIL (Renderizado en tiempo real)
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    layers.forEach(layer => {
      ctx.save();
      ctx.globalAlpha = layer.opacity;

      if (layer.type === 'image' && layer.img) {
        if (layer.chroma > 0) {
          // Filtrado de mesa blanca en búfer local
          const cache = document.createElement('canvas');
          cache.width = layer.w; cache.height = layer.h;
          const cCtx = cache.getContext('2d');
          cCtx.drawImage(layer.img, 0, 0, layer.w, layer.h);
          const imgData = cCtx.getImageData(0, 0, layer.w, layer.h);
          const d = imgData.data;
          for (let i = 0; i < d.length; i += 4) {
            if (d[i] > 255 - layer.chroma && d[i+1] > 255 - layer.chroma && d[i+2] > 255 - layer.chroma) {
              d[i+3] = 0;
            }
          }
          cCtx.putImageData(imgData, 0, 0);
          ctx.drawImage(cache, layer.x, layer.y);
        } else {
          ctx.drawImage(layer.img, layer.x, layer.y, layer.w, layer.h);
        }
      }

      if (layer.type === 'box') {
        ctx.fillStyle = layer.color;
        ctx.fillRect(layer.x, layer.y, layer.w, layer.h);
        if (layer.borderWidth > 0) {
          ctx.strokeStyle = layer.borderColor;
          ctx.lineWidth = layer.borderWidth;
          ctx.strokeRect(layer.x, layer.y, layer.w, layer.h);
        }
      }

      if (layer.type === 'text') {
        ctx.font = `900 ${layer.fontSize}px ${layer.fontStyle === 'sans' ? 'sans-serif' : 'impact'}`;
        ctx.textBaseline = 'top';
        
        if (layer.fontStyle === 'tron') {
          ctx.shadowColor = layer.borderColor;
          ctx.shadowBlur = 20;
        }
        if (layer.fontStyle === 'graffiti') {
          ctx.strokeStyle = '#000000';
          ctx.lineWidth = 8;
          ctx.strokeText(layer.text, layer.x, layer.y);
        }
        ctx.fillStyle = layer.color;
        ctx.fillText(layer.text, layer.x, layer.y);
        
        // Ajustar caja lógica al tamaño real estimado del texto para poder arrastrarlo bien
        layer.w = ctx.measureText(layer.text).width;
        layer.h = layer.fontSize;
      }

      // SI ESTÁ SELECCIONADA, DIBUJAR MARCO DE EDICIÓN (PHOTOSHOP STYLE)
      if (layer.id === selectedId) {
        ctx.strokeStyle = '#FF6A00';
        ctx.lineWidth = 4;
        ctx.strokeRect(layer.x, layer.y, layer.w, layer.h);
        
        // Manija de redimensionado abajo a la derecha
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(layer.x + layer.w - 15, layer.y + layer.h - 15, 20, 20);
        ctx.strokeStyle = '#FF6A00';
        ctx.strokeRect(layer.x + layer.w - 15, layer.y + layer.h - 15, 20, 20);
      }
      ctx.restore();
    });
  }

  // DETECCIÓN COORDENADAS TÁCTILES DEL CELULAR MAPPED AL CANVAS REAL
  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: ((clientX - rect.left) / rect.width) * canvas.width,
      y: ((clientY - rect.top) / rect.height) * canvas.height
    };
  }

  // MANEJO DE EVENTOS MOUSE Y TOUCHSCREEN
  function startDrag(e) {
    const coords = getCanvasCoords(e);
    selectedId = null;
    isDragging = false;
    isResizing = false;

    // Evaluar capas de arriba hacia abajo (orden de renderizado inverso)
    for (let i = layers.length - 1; i >= 0; i--) {
      const l = layers[i];
      
      // Evaluar primero si tocó la manija de agrandar de la capa seleccionada activa
      if (l.id === selectedId || layers.find(layer => layer.id === selectedId)) {
        const sel = layers.find(layer => layer.id === selectedId);
        if (sel && coords.x >= sel.x + sel.w - 30 && coords.x <= sel.x + sel.w + 20 &&
            coords.y >= sel.y + sel.h - 30 && coords.y <= sel.y + sel.h + 20) {
          selectedId = sel.id;
          isResizing = true;
          return;
        }
      }

      // Evaluar si tocó el cuerpo del elemento
      if (coords.x >= l.x && coords.x <= l.x + l.w && coords.y >= l.y && coords.y <= l.y + l.h) {
        selectedId = l.id;
        isDragging = true;
        dragOffsetX = coords.x - l.x;
        dragOffsetY = coords.y - l.y;
        updateUI();
        render();
        return;
      }
    }
    updateUI();
    render();
  }

  function doDrag(e) {
    if (!selectedId) return;
    const coords = getCanvasCoords(e);
    const l = layers.find(layer => layer.id === selectedId);
    if (!l) return;

    if (isDragging) {
      l.x = coords.x - dragOffsetX;
      l.y = coords.y - dragOffsetY;
      render();
    } else if (isResizing) {
      l.w = Math.max(30, coords.x - l.x);
      l.h = Math.max(30, coords.y - l.y);
      if(l.type === 'text') l.fontSize = Math.max(16, l.h); // Escalar letra proporcionalmente al estirar
      render();
    }
  }

  function stopDrag() {
    isDragging = false;
    isResizing = false;
  }

  // ASIGNAR EVENTOS DE ENTRADA MIXTA (MÓVIL Y ESCRITORIO)
  canvas.addEventListener('mousedown', startDrag);
  window.addEventListener('mousemove', doDrag);
  window.addEventListener('mouseup', stopDrag);

  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); startDrag(e); }, {passive: false});
  window.addEventListener('touchmove', function(e) { doDrag(e); }, {passive: true});
  window.addEventListener('touchend', stopDrag);

  // CONTROL DE PROFUNDIDAD (ORDEN DE SUPERPOSICIÓN DE IMAGEN)
  function moveDepth(dir) {
    const idx = layers.findIndex(l => l.id === selectedId);
    if (idx === -1) return;
    if (dir === 'up' && idx < layers.length - 1) {
      const temp = layers[idx]; layers[idx] = layers[idx+1]; layers[idx+1] = temp;
    } else if (dir === 'down' && idx > 0) {
      const temp = layers[idx]; layers[idx] = layers[idx-1]; layers[idx-1] = temp;
    }
    render();
  }

  function deleteSelected() {
    layers = layers.filter(l => l.id !== selectedId);
    selectedId = null;
    updateUI();
    render();
  }

  // PANEL LATERAL DINÁMICO SEGÚN LA CAPA
  function updateUI() {
    const noSel = document.getElementById('noSelectionNotice');
    const panel = document.getElementById('controlsPanel');
    const container = document.getElementById('dynamicInputs');
    const layer = layers.find(l => l.id === selectedId);

    if (!layer) { noSel.style.display = 'block'; panel.style.display = 'none'; return; }
    noSel.style.display = 'none'; panel.style.display = 'block';
    
    document.getElementById('layerTitle').innerText = "Editar " + layer.type.toUpperCase();
    container.innerHTML = '';

    if (layer.type === 'text') {
      container.innerHTML = `
        <label>Contenido del Texto</label>
        <input type="text" value="${layer.text}" oninput="updateProp('text', this.value)" />
        <label>Estilo Tipográfico</label>
        <select onchange="updateProp('fontStyle', this.value)">
          <option value="impact" ${layer.fontStyle==='impact'?'selected':''}>Deportivo (Impact)</option>
          <option value="tron" ${layer.fontStyle==='tron'?'selected':''}>Efecto Neón / Tron</option>
          <option value="graffiti" ${layer.fontStyle==='graffiti'?'selected':''}>Urbano (Graffiti)</option>
        </select>
        <label>Color de Letra</label>
        <input type="color" value="${layer.color}" onchange="updateProp('color', this.value)" />
        <label>Color Resplandor (Neón)</label>
        <input type="color" value="${layer.borderColor}" onchange="updateProp('borderColor', this.value)" />
      `;
    } else if (layer.type === 'box') {
      container.innerHTML = `
        <label>Color de Fondo</label>
        <input type="color" value="${layer.color}" onchange="updateProp('color', this.value)" />
        <label>Color de Borde</label>
        <input type="color" value="${layer.borderColor}" onchange="updateProp('borderColor', this.value)" />
        <label>Grosor de Borde</label>
        <input type="range" min="0" max="20" value="${layer.borderWidth}" oninput="updateProp('borderWidth', parseInt(this.value))" />
      `;
    } else if (layer.type === 'image') {
      container.innerHTML = `
        <label>Quitar Fondo Blanco (Mesa de Trabajo)</label>
        <input type="range" min="0" max="150" value="${layer.chroma}" oninput="updateProp('chroma', parseInt(this.value))" />
      `;
    }
  }

  function updateProp(prop, val) {
    const l = layers.find(layer => layer.id === selectedId);
    if (l) { l[prop] = val; render(); }
  }

  // PROCESO DE CAPTURA Y EXPORTACIÓN COMPLETA
  function captureFrame() {
    timeline.push(canvas.toDataURL('image/jpeg', 0.85));
    const track = document.getElementById('timelineTrack');
    const box = document.createElement('div');
    box.className = 'frame-box';
    box.style.backgroundImage = `url(${timeline[timeline.length - 1]})`;
    track.appendChild(box);
  }

  function downloadPNG() {
    // Deseleccionar temporalmente para limpiar el recuadro naranja de edición en la foto final
    const prevSel = selectedId; selectedId = null; render();
    setTimeout(() => {
      const a = document.createElement('a');
      a.download = 'flyer_destino_motos.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      selectedId = prevSel; render();
    }, 50);
  }

  function compileGIF() {
    if(timeline.length === 0) { alert('Captura algunos frames primero.'); return; }
    alert('Compilando secuencia... El archivo se descargará en instantes.');
    // Simulación nativa directa de descarga secuencial ligera
    const a = document.createElement('a');
    a.download = 'animacion_destino.jpg';
    a.href = timeline[timeline.length - 1];
    a.click();
  }
</script>
</body>
</html>
