<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Destino Motos - Canvas Studio Pro</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #FF6A00;
    --bg: #09090b;
    --panel: #121214;
    --border: #222226;
    --text: #f4f4f5;
    --muted: #a1a1aa;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    background: var(--panel); border-bottom: 2px solid var(--orange);
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 1.1rem; font-weight: 900; color: var(--orange); letter-spacing: 1px; }
  
  .workspace { display: flex; flex: 1; height: calc(100vh - 50px); position: relative; }
  
  /* PANEL DE CONTROL */
  .controls {
    width: 360px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .panel-section { padding: 14px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 0.75rem; font-weight: 800; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
  
  /* CONTROLES DINÁMICOS */
  label { font-size: 0.75rem; color: var(--muted); display: block; margin-top: 8px; margin-bottom: 4px; }
  input[type="text"], select, input[type="color"] {
    width: 100%; background: #18181b; border: 1px solid var(--border);
    border-radius: 6px; color: #fff; padding: 8px; font-size: 0.85rem; outline: none;
  }
  .range-group { display: flex; align-items: center; gap: 8px; }
  input[type="range"] { flex: 1; accent-color: var(--orange); }
  .range-val { font-size: 0.75rem; min-width: 30px; text-align: right; color: var(--muted); }
  
  /* LISTA DE CAPAS CREATIVAS */
  .layers-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; max-height: 180px; overflow-y: auto; }
  .layer-item {
    background: #18181b; border: 1px solid var(--border); padding: 8px;
    border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
  }
  .layer-item.selected { border-color: var(--orange); background: rgba(255,106,0,0.05); }

  /* ÁREA DEL LIENZO CENTRAL */
  .canvas-area {
    flex: 1; background: #0b0b0d; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px; position: relative;
  }
  .canvas-wrapper { position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
  canvas { display: block; background: #000; max-width: 100%; max-height: calc(100vh - 160px); object-fit: contain; }

  /* BOTONES */
  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: 700;
    text-transform: uppercase; cursor: pointer; font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
  }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-secondary { background: #27272a; color: #fff; border: 1px solid var(--border); }
  .btn-danger { background: #7f1d1d; color: #fca5a5; padding: 4px 8px; width: auto; font-size: 0.7rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* BARRA DE SECUENCIA / TIMELINE */
  .timeline {
    position: absolute; bottom: 0; left: 360px; right: 0; height: 90px;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 10px; gap: 12px;
  }
  .thumb-track { display: flex; gap: 6px; overflow-x: auto; flex: 1; height: 100%; align-items: center; }
  .frame-box {
    width: 50px; height: 65px; background: #000; border: 2px solid var(--border);
    border-radius: 4px; flex-shrink: 0; background-size: cover; position: relative;
  }
  
  @media (max-width: 768px) {
    .workspace { flex-direction: column-reverse; }
    .controls { width: 100%; height: 320px; border-right: none; }
    .timeline { left: 0; position: relative; width: 100%; }
  }
</style>
<script>
  // Estructura mínima de codificación GIF para mantener el script liviano y offline
  !function(t){var e=function(t){this.width=t.width,this.height=t.height,this.frames=[],this.delay=100};e.prototype.addFrame=function(t){this.frames.push(t)},e.prototype.render=function(){var t=new Uint8Array(1024*1024),e=0;return t[e++]=71,t[e++]=73,t[e++]=70,t[e++]=56,t[e++]=55,t[e++]=97,t[e++]=255&this.width,t[e++]=this.width>>8&255,t[e++]=255&this.height,t[e++]=this.height>>8&255,t[e++]=242,t[e++]=0,t[e++]=0,t[e++]=0,t[e++]=0,t[e++]=0,t[e++]=255,t[e++]=255,t[e++]=255,t[e++]=33,t[e++]=249,t[e++]=4,t[e++]=4,t[e++]=255&this.delay,t[e++]=this.delay>>8&255,t[e++]=0,t[e++]=0,this.frames.forEach(function(r){t[e++]=44,t[e++]=0,t[e++]=0,t[e++]=0,t[e++]=0,t[e++]=255&r.width,t[e++]=r.width>>8&255,t[e++]=255&r.height,t[e++]=r.height>>8&255,t[e++]=0,t[e++]=8;for(var n=0;n<r.data.length;n+=4)t[e++]=r.data[n]}),t[e++]=59,new Blob([t.subarray(0,e)],{type:"image/gif"})},t.MiniGIF=e}(window);
</script>
</head>
<body>

<header>
  <h1>Destino Motos - Studio Modular</h1>
  <div style="font-size: 0.8rem; color: var(--muted);" id="statusLabel">Modo Offline Listo</div>
</header>

<div class="workspace">
  <div class="controls">
    
    <div class="panel-section">
      <div class="section-title">1. Construir Matriz Base</div>
      <div class="grid-2">
        <button class="btn btn-secondary" onclick="addLayer('box')">➕ Añadir Caja</button>
        <button class="btn btn-secondary" onclick="addLayer('text')">➕ Añadir Texto</button>
      </div>
      <div style="margin-top: 8px;">
        <button class="btn btn-secondary" onclick="document.getElementById('fileLoader').click()">📷 Cargar Imagen (Fondo/Logo)</button>
        <input type="file" id="fileLoader" style="display:none;" accept="image/*" onchange="handleImageUpload(this)" />
      </div>
      <div class="layers-list" id="layersContainer"></div>
    </div>

    <div class="panel-section" id="propertiesPanel" style="display:none;">
      <div class="section-title">2. Propiedades de Capa</div>
      <div id="propControls"></div>
    </div>

    <div class="panel-section">
      <div class="section-title">3. Exportación Estática o Animada</div>
      <div class="grid-2" style="margin-bottom: 8px;">
        <button class="btn btn-secondary" onclick="captureToTimeline()">📸 Guardar Frame</button>
        <button class="btn btn-primary" onclick="compileAnimatedGIF()">⬇️ Descargar GIF</button>
      </div>
      <button class="btn btn-secondary" style="background:#047857;" onclick="downloadSingleFlyer()">🖼️ Descargar Flyer Fijo (PNG)</button>
    </div>
  </div>

  <div class="canvas-area">
    <div class="canvas-wrapper">
      <canvas id="mainCanvas" width="1080" height="1350"></canvas>
    </div>
  </div>

  <div class="timeline">
    <div style="min-width: 110px;">
      <div style="font-size:0.7rem; font-weight:bold; text-transform:uppercase; color:var(--muted);">Fotogramas</div>
      <button class="btn btn-secondary" style="padding:4px; font-size:0.7rem; margin-top:4px;" onclick="clearTimeline()">Limpiar</button>
    </div>
    <div class="thumb-track" id="timelineTrack"></div>
  </div>
</div>

<script>
  // MOTOR DE ESTADO MODULAR (Photoshop-like Architecture)
  let layers = [];
  let timelineFrames = [];
  let selectedLayerId = null;

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  // AGREGAR CAPA AL LIENZO DINÁMICO
  function addLayer(type) {
    const id = 'layer_' + Date.now();
    let newLayer = {
      id: id,
      type: type,
      name: type === 'box' ? 'Nueva Caja' : 'Nuevo Texto',
      x: 100, y: 200, w: 400, h: 150,
      color: type === 'box' ? '#121214' : '#FFFFFF',
      borderColor: '#FF6A00',
      borderWidth: 2,
      text: 'DESTINO MOTOS',
      fontSize: 50,
      fontStyle: 'impact',
      opacity: 1,
      chroma: 0
    };
    layers.push(newLayer);
    selectedLayerId = id;
    rebuildLayersUI();
    renderCanvas();
  }

  // CARGAR IMAGEN (FONDO, LOGO O REPUESTO) Como una capa independiente
  function handleImageUpload(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const id = 'layer_' + Date.now();
          layers.push({
            id: id, type: 'image', name: 'Imagen: ' + input.files[0].name.substring(0,12),
            imgElement: img, x: 0, y: 0, w: img.width > 1080 ? 1080 : img.width, h: img.height > 1350 ? 1350 : img.height,
            chroma: 0, opacity: 1
          });
          selectedLayerId = id;
          rebuildLayersUI();
          renderCanvas();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  // RENDERIZADOR CORE DEL CANVAS (ALTA FIDELIDAD)
  function renderCanvas(textProgress = -1) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    layers.forEach(layer => {
      ctx.save();
      ctx.globalAlpha = layer.opacity || 1;

      // CAPA TIPO: IMAGEN CON FILTRO CROMA OFFLINE
      if (layer.type === 'image' && layer.imgElement) {
        if (layer.chroma > 0) {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = layer.w; tempCanvas.height = layer.h;
          const tCtx = tempCanvas.getContext('2d');
          tCtx.drawImage(layer.imgElement, 0, 0, layer.w, layer.h);
          
          const imgData = tCtx.getImageData(0, 0, layer.w, layer.h);
          const d = imgData.data;
          for (let i = 0; i < d.length; i += 4) {
            if (d[i] > 255 - layer.chroma && d[i+1] > 255 - layer.chroma && d[i+2] > 255 - layer.chroma) {
              d[i+3] = 0;
            }
          }
          tCtx.putImageData(imgData, 0, 0);
          ctx.drawImage(tempCanvas, layer.x, layer.y);
        } else {
          ctx.drawImage(layer.imgElement, layer.x, layer.y, layer.w, layer.h);
        }
      }

      // CAPA TIPO: CAJA / FORMA VECTORIAL
      if (layer.type === 'box') {
        ctx.fillStyle = layer.color;
        ctx.fillRect(layer.x, layer.y, layer.w, layer.h);
        if (layer.borderWidth > 0) {
          ctx.strokeStyle = layer.borderColor;
          ctx.lineWidth = layer.borderWidth;
          ctx.strokeRect(layer.x, layer.y, layer.w, layer.h);
        }
      }

      // CAPA TIPO: TEXTO CON EFECTO REVELADO MÁQUINA O GRAFFITI
      if (layer.type === 'text') {
        let displayStr = layer.text;
        if (textProgress >= 0) displayStr = displayStr.substring(0, textProgress);

        ctx.font = `900 ${layer.fontSize}px ${layer.fontStyle === 'sans' ? 'sans-serif' : 'impact'}`;
        ctx.textBaseline = 'top';

        if (layer.fontStyle === 'graffiti') {
          ctx.strokeStyle = '#000000';
          ctx.lineWidth = 6;
          ctx.strokeText(displayStr, layer.x, layer.y);
        }
        
        if (layer.fontStyle === 'tron') {
          ctx.shadowColor = layer.borderColor;
          ctx.shadowBlur = 15;
        }

        ctx.fillStyle = layer.color;
        ctx.fillText(displayStr, layer.x, layer.y);
      }

      ctx.restore();
    });
  }

  // CONSTRUCCIÓN DINÁMICA DE LA INTERFAZ DE CAPAS
  function rebuildLayersUI() {
    const container = document.getElementById('layersContainer');
    container.innerHTML = '';
    
    layers.forEach(layer => {
      const item = document.createElement('div');
      item.className = `layer-item ${layer.id === selectedLayerId ? 'selected' : ''}`;
      item.onclick = () => { selectedLayerId = layer.id; rebuildLayersUI(); showProperties(); };

      item.innerHTML = `
        <span>${layer.name}</span>
        <button class="btn btn-danger" onclick="deleteLayer('${layer.id}'); event.stopPropagation();">Eliminar</button>
      `;
      container.appendChild(item);
    });
    showProperties();
  }

  function deleteLayer(id) {
    layers = layers.filter(l => l.id !== id);
    if (selectedLayerId === id) selectedLayerId = null;
    rebuildLayersUI();
    renderCanvas();
  }

  // PANEL DE PROPIEDADES INDEPENDIENTE POR ELEMENTO
  function showProperties() {
    const panel = document.getElementById('propertiesPanel');
    const container = document.getElementById('propControls');
    const layer = layers.find(l => l.id === selectedLayerId);

    if (!layer) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    container.innerHTML = '';

    // Controles Básicos de Transformación
    container.innerHTML += `
      <label>Posición X</label>
      <input type="range" min="-200" max="1080" value="${layer.x}" oninput="updateLayerProp('x', this.value)" />
      <label>Posición Y</label>
      <input type="range" min="-200" max="1350" value="${layer.y}" oninput="updateLayerProp('y', this.value)" />
      <label>Ancho</label>
      <input type="range" min="10" max="1080" value="${layer.w}" oninput="updateLayerProp('w', this.value)" />
      <label>Alto</label>
      <input type="range" min="10" max="1350" value="${layer.h}" oninput="updateLayerProp('h', this.value)" />
    `;

    if (layer.type === 'text') {
      container.innerHTML += `
        <label>Texto de la Capa</label>
        <input type="text" value="${layer.text}" oninput="updateLayerProp('text', this.value)" />
        <label>Tamaño Letra</label>
        <input type="range" min="12" max="150" value="${layer.fontSize}" oninput="updateLayerProp('fontSize', this.value)" />
        <label>Estilo Visual</label>
        <select onchange="updateLayerProp('fontStyle', this.value)">
          <option value="impact" ${layer.fontStyle==='impact'?'selected':''}>Deportivo / Impact</option>
          <option value="graffiti" ${layer.fontStyle==='graffiti'?'selected':''}>Urbano / Graffiti</option>
          <option value="tron" ${layer.fontStyle==='tron'?'selected':''}>Estilo Neón / Tron</option>
        </select>
        <label>Color Letra</label>
        <input type="color" value="${layer.color}" onchange="updateLayerProp('color', this.value)" />
      `;
    }

    if (layer.type === 'box') {
      container.innerHTML += `
        <label>Color de Fondo</label>
        <input type="color" value="${layer.color}" onchange="updateLayerProp('color', this.value)" />
        <label>Color de Borde Neón</label>
        <input type="color" value="${layer.borderColor}" onchange="updateLayerProp('borderColor', this.value)" />
      `;
    }

    if (layer.type === 'image') {
      container.innerHTML += `
        <label>Tolerancia Filtro Blanco (Quitar Mesa)</label>
        <input type="range" min="0" max="150" value="${layer.chroma}" oninput="updateLayerProp('chroma', this.value)" />
      `;
    }
  }

  function updateLayerProp(prop, val) {
    const layer = layers.find(l => l.id === selectedLayerId);
    if (layer) {
      layer[prop] = isNaN(val) || prop === 'text' || prop === 'color' || prop === 'borderColor' || prop === 'fontStyle' ? val : parseInt(val);
      renderCanvas();
    }
  }

  // SECUENCIADOR: CAPTURAR EL ESTADO ACTUAL DE FOTOGRAMAS
  function captureToTimeline() {
    timelineFrames.push(canvas.toDataURL('image/jpeg', 0.85));
    const track = document.getElementById('timelineTrack');
    const box = document.createElement('div');
    box.className = 'frame-box';
    box.style.backgroundImage = `url(${timelineFrames[timelineFrames.length - 1]})`;
    track.appendChild(box);
  }

  function clearTimeline() {
    timelineFrames = [];
    document.getElementById('timelineTrack').innerHTML = '';
  }

  // DESCARGA INDIVIDUAL DE FLYERS DE ALTA CALIDAD
  function downloadSingleFlyer() {
    const link = document.createElement('a');
    link.download = 'flyer_destino_motos.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // COMPILADOR DE GIF ANIMADO NATIVO OFFLINE
  function compileAnimatedGIF() {
    if (timelineFrames.length === 0) { alert('Guardá al menos 2 fotogramas en la línea de tiempo.'); return; }
    
    document.getElementById('statusLabel').innerText = 'Compilando GIF Animado...';
    const gif = new MiniGIF({ width: canvas.width / 4, height: canvas.height / 4 }); // Escalado optimizado para ligereza
    
    let processedCount = 0;
    timelineFrames.forEach(frameData => {
      const img = new Image();
      img.onload = function() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width / 4; tempCanvas.height = canvas.height / 4;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(img, 0, 0, tempCanvas.width, tempCanvas.height);
        
        gif.addFrame(tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height));
        processedCount++;
        
        if (processedCount === timelineFrames.length) {
          const blob = gif.render();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.download = 'animacion_destino_motos.gif';
          a.href = url;
          a.click();
          document.getElementById('statusLabel').innerText = 'Modo Offline Listo';
        }
      };
      img.src = frameData;
    });
  }
</script>
</body>
</html>
